<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Авторизация</title>
    </head>

    <body>
    <form method="post">
        {% csrf_token %}
        <div>
            <label>Логин</label>
            <input type="text" name="username" placeholder="Введите логин..." required>
        </div>

        <div>
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль..." required>
        </div>

        <button type="submit">Войти</button>
    </form>
    </body>

</html>
